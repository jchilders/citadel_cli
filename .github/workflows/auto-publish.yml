name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml
    
  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build

      - name: Verify npm package artifacts
        run: npm run verify:pack
      
      - name: Verify tag matches package versions
        id: version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"

          # All three published packages release in lockstep; every version must
          # equal the tag (@citadel/cli's dep on @citadel/core uses a caret range,
          # so a matching minor/patch bump always resolves).
          for pkg in packages/core packages/cli packages/react; do
            PACKAGE_VERSION=$(node -p "require('./$pkg/package.json').version")
            if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
              echo "$pkg version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
              exit 1
            fi
          done

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        # Root is a private workspace orchestrator. Publish @citadel/core first
        # (a dependency of @citadel/cli), then @citadel/cli, then citadel_cli
        # (packages/react, which bundles @citadel/core into its own dist).
        # @citadel/sample-commands stays private and is not published.
        run: |
          set -euo pipefail
          npm publish --access public -w @citadel/core
          npm publish --access public -w @citadel/cli
          npm publish --access public -w citadel_cli
